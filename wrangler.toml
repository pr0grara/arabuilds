name = "arabuilds"
compatibility_date = "2024-09-23"
pages_build_output_dir = "."

# D1 database binding. Create it once with:
#   npx wrangler d1 create arabuilds-intake
# then paste the printed database_id below.
[[d1_databases]]
binding = "DB"
database_name = "arabuilds-intake"
database_id = "aa1e362d-1057-4832-82a7-c19517e3214e"

# Non-secret env vars. Set the sensitive ones as secrets instead (see README-intake.md):
#   RESEND_API_KEY, ADMIN_PASS  ->  npx wrangler pages secret put NAME
[vars]
ALERT_TO = "azbaghda@gmail.com"
ALERT_FROM = "AraBuilds Intake <onboarding@resend.dev>"
ADMIN_USER = "ara"